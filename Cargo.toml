[package]
name = "dasp-rs"
version = "0.1.1"
edition = "2024"
description = "A crate for digital signal processing, speech processing, music analysis, and phonetics."
authors = ["Amirhossein Ghanipour amirhosseinghanipour@gmail.com"]
license = "CC-BY-NC-4.0"
keywords = ["audio", "dsp", "audio-processing", "speech-processing", "music-analysis"]
repository = "https://github.com/amirhosseinghanipour/dasp-rs"
documentation = "https://docs.rs/audio_processing/0.1.1"
categories = ["multimedia::audio", "algorithms"]
readme = "README.md"

[dependencies]
hound = "3.5.1"
rustfft = "6.2.0"
num-complex = "0.4.6"
thiserror = "1.0"
rubato = "0.16.1"
ndarray = { version = "0.16.1", features = ["rayon"] }
approx = "0.5.1"
rayon = "1.10.0"
ndarray-linalg = { version = "0.17.0", features = ["openblas"] }

[features]
# Propagate selected ndarray-linalg features to this crate so downstream users can
# enable OpenBLAS backends via our crate features.
default = ["openblas-system", "openblas-static"]
# Use system OpenBLAS
openblas-system = ["ndarray-linalg/openblas-system"]
# Use static OpenBLAS
openblas-static = ["ndarray-linalg/openblas-static"]
